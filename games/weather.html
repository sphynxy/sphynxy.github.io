<!DOCTYPE html>
    <head>
        <style type="text/css" media="screen">
            * {
                margin: 0;
                padding: 0;
                border:0;
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                font-stretch: ultra-condensed;
            }
            body {
                background-color: #0d0058;
            }
            #maingrad {
                width: 60vw;
                position:fixed;
                border-top: 8vh solid transparent;
                background: linear-gradient(0deg, rgba(52,0,65,1) 0%, rgba(255,136,0,1) 100%) border-box;
            }
            #trigrad {
                width: 10vw;
                position:fixed;
                left: 60vw;
                border-top: 8vh solid transparent;
                border-right: 8vh solid #0d0058;
                background: linear-gradient(0deg, rgba(52,0,65,1) 0%, rgba(255,136,0,1) 100%) border-box;
            }
            
            #content-container {
                background: linear-gradient(0deg, rgba(255,136,0,1) 0%, rgba(52,0,65,1) 100%);
                width:100vw;
                height: 75vh;
                position:fixed;
                top:8vh;
            }
            #content {
                position: fixed;
                left: 50%;
                transform: translate(-50%);
                width: 75vw;
                height: 65vh;
                box-shadow: inset 0 0 20px 10px rgba(112,120,255,1);
                background: rgb(39, 45, 126);
            }
            h1 {
                position: absolute;
                color: rgb(255, 238, 0);
                top: 0vw;
                left:25vw;
                z-index: 100;
                font-size: 3vh;
                text-shadow: 2px 2px #000000;
                
            }
            #time {
                color: white;
                left:50vw;
                font-size: 2vh;
            }

            .crt::before {
                content: " ";
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
                background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
                z-index: 2;
                background-size: 100% 2px, 3px 100%;
                pointer-events: none;
                }
            @keyframes flicker {
            0% {
            opacity: 0.27861;
            }
            5% {
            opacity: 0.34769;
            }
            10% {
            opacity: 0.23604;
            }
            15% {
            opacity: 0.90626;
            }
            20% {
            opacity: 0.18128;
            }
            25% {
            opacity: 0.83891;
            }
            30% {
            opacity: 0.65583;
            }
            35% {
            opacity: 0.67807;
            }
            40% {
            opacity: 0.26559;
            }
            45% {
            opacity: 0.84693;
            }
            50% {
            opacity: 0.96019;
            }
            55% {
            opacity: 0.08594;
            }
            60% {
            opacity: 0.20313;
            }
            65% {
            opacity: 0.71988;
            }
            70% {
            opacity: 0.53455;
            }
            75% {
            opacity: 0.37288;
            }
            80% {
            opacity: 0.71428;
            }
            85% {
            opacity: 0.70419;
            }
            90% {
            opacity: 0.7003;
            }
            95% {
            opacity: 0.36108;
            }
            100% {
            opacity: 0.24387;
            }
            }
            .crt::after {
                content: " ";
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
                background: rgba(18, 16, 16, 0.1);
                opacity: 0;
                z-index: 2;
                pointer-events: none;
                animation: flicker 0.15s infinite;
            }
            #scroll-container {
                position: fixed;
                top: 81vh;
                width: 100vw;
                height:35vh;
                overflow: hidden;
                background:rgba(112,120,255,1);
                border-top: 2px solid white;
            }
            p {
                color: white;
                font-size: 2em;
                text-overflow:clip;
                text-shadow: 2px 2px #000000;
            }

            #scroll-text {
                text-align: right;

                transform: translateX(0%);

                animation: my-animation 15s linear infinite;
            }

            @keyframes my-animation {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(-100%);
            }
            }

        </style >
        <script type="text/javascript">
            
            function check(){
                var now = new Date();
                time = now.toLocaleTimeString('en-US');
                date = now.toLocaleDateString('en-us', { weekday:"short", year:"numeric", month:"short", day:"numeric"})
                document.getElementById("time").innerHTML = `${time.toUpperCase()}<br>${date.toUpperCase().replace(',', '')}`;
            }
            function init(){
                window.setInterval(check, 500);
            }
            window.onload = init;
        </script>
    </head>
    <body>
        <div class="crt"></div>
        <header>
            <h1>Current<br>Conditions</h1>
            <h1 id="time"></h1>
            <div id="maingrad">
                
            </div>
            <div id="trigrad"></div>
        </header>
        <div id="content-container">
            <div id="content">

            </div>
        </div>
        <div id="scroll-container">
            <p id="scroll-text">
                You are tuned to the Northern Osean Weather Station.
            </p>
        </div>
    </body>
</html>
